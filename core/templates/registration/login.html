{% extends 'base.html' %} {% block content%}
<div
  class="container w-50 py-3 shadow-light rounded-4 d-flex flex-column align-items-center mt-5 card-color"
>
  <h2 class="title">Login</h2>

  <form method="POST" class="w-75">
    {% csrf_token %}
    <div class="mb-3">
      <label for="{{ form.username.id_for_label }}" class="form-label"
        >Username</label
      >
      <input
        type="text"
        name="{{ form.username.html_name }}"
        id="{{ form.username.id_for_label }}"
        class="form-control"
        placeholder="Enter username"
      />
    </div>

    <div class="mb-3">
      <label for="{{ form.password.id_for_label }}" class="form-label"
        >Password</label
      >
      <input
        type="password"
        name="{{ form.password.html_name }}"
        id="{{ form.password.id_for_label }}"
        class="form-control"
        placeholder="Enter password"
      />
    </div>
    <button type="submit" class="btn btn-primary w-100 my-2">Login</button>
  </form>

  {% if form.errors %}
  <p style="color: red">Invalid username or password.</p>
  {% endif %}

  <p class="small">Don't have an account? <a href="/register">Register</a></p>
</div>
{% endblock %}

{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Blog{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'core/style.css' %}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg px-2 shadow-sm" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand title" href="#">BLOG</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="offcanvas offcanvas-end"
          tabindex="-1"
          id="offcanvasNavbar"
          aria-labelledby="offcanvasNavbarLabel"
        >
          <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menue</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="offcanvas"
              aria-label="Close"
            ></button>
          </div>
          <div class="offcanvas-body d-flex align-items-center">
            <ul
              class="navbar-nav justify-content-center align-items-center flex-grow-1 gap-5"
            >
              <li class="nav-item">
                <a
                  class="nav-link {% if request.path == '/' %}active{% endif %}"
                  href="/"
                  >List Post</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link {% if '/create' in request.path or request.GET.next == '/create' %}active{% endif %}"
                  href="/create"
                  >Create Post</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link {% if '/profile' in request.path or request.GET.next == '/profile' %}active{% endif %}"
                  href="{% url 'profile' %}"
                  >Profile</a
                >
              </li>
              <li>
                {% if user.is_authenticated %}
                <form method="POST" action="{% url 'logout' %}">
                  {% csrf_token %}
                  <button type="submit" class="nav-link">Logout</button>
                </form>
                {% else %}
                <a
                  href="{% url 'login' %}"
                  class="nav-link {% if '/login' in request.path and request.GET.next != '/create' %}active{% endif %}"
                  >Login</a
                >
                {% endif %}
              </li>
            </ul>

            <label class="toggle my-auto">
              <input type="checkbox" id="theme-toggle" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>
    </nav>

    <main>
      <div class="container mt-4 d-flex justify-content-center">
        {% block content %} {% endblock %}
      </div>
    </main>

    <script>
      const toggle = document.getElementById("theme-toggle");
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
        toggle.checked = true;
      }

      toggle.addEventListener("change", () => {
        if (toggle.checked) {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("theme", "dark");
        } else {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("theme", "light");
        }
      });
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
